version: '3.8'
# Spring Boot + MyBatis + React; MySQL (normalized schema + indexes) + Redis (TTL + invalidation)

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: rnd-lab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rnd_lab_management
      MYSQL_USER: rndlab
      MYSQL_PASSWORD: rndlab123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
    networks:
      - rnd-lab-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: rnd-lab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rnd-lab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rnd-lab-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rnd_lab_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rnd-lab-network
    restart: unless-stopped

  # React前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rnd-lab-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - rnd-lab-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  rnd-lab-network:
    driver: bridge

